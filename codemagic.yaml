workflows:
  ios-build:
    name: SmartFit iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.anasoufkir.smartfit"
      xcode: latest
      cocoapods: default
      node: 20
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --ignore-scripts
      
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      
      - name: Build unsigned IPA (for testing)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive
      
      - name: Export IPA
        script: |
          cd ios/App
          mkdir -p build/ipa
          cp -r build/App.xcarchive/Products/Applications/*.app build/ipa/ 2>/dev/null || true
          cd build/ipa
          mkdir -p Payload
          mv *.app Payload/ 2>/dev/null || true
          zip -r SmartFit.ipa Payload
          ls -la

    artifacts:
      - ios/App/build/ipa/*.ipa
      - ios/App/build/App.xcarchive

    publishing:
      email:
        recipients:
          - anasoufkir94@gmail.com
        notify:
          success: true
          failure: true

  android-build:
    name: SmartFit Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "com.anasoufkir.smartfit"
      node: 20
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --ignore-scripts
      
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
      
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - anasoufkir94@gmail.com
        notify:
          success: true
          failure: true
